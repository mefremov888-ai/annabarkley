<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body & Emotions — Mira — Anna Barkley</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F2;--sage:#7C9A7C;--saged:#5B7A5B;--sagem:#A8BFA8;--sagep:#E8EFE8;--rose:#EAC7C7;--rosed:#D4A9A9;--rosep:#F5E6E6;--ch:#1A1A1A;--tx:#3B3B3B;--txm:#8A8A80;--wh:#FFFFFF;--brd:#E8E4DC;--fh:'Sora',system-ui,sans-serif;--fb:'Plus Jakarta Sans',system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:var(--fb);color:var(--tx);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px 60px}
.hdr{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.lic{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--sage),var(--rosed));display:flex;align-items:center;justify-content:center}
.lic svg{width:18px;height:18px;color:#fff}
.hdr>span{font-family:var(--fh);font-size:16px;color:var(--ch)}
.lang{display:flex;gap:2px;background:rgba(0,0,0,.04);border-radius:20px;padding:2px;margin-left:auto}
.lang button{font-family:var(--fb);font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;transition:all .3s;color:var(--txm);background:transparent}
.lang button.ac{color:var(--wh);background:var(--sage)}
.main{display:grid;grid-template-columns:380px 1fr;gap:32px;align-items:start}
@media(max-width:860px){.main{grid-template-columns:1fr;max-width:440px;margin:0 auto}}

/* Mira as the body - left column */
.mira-body{position:relative;width:100%;overflow:hidden;border-radius:28px;background:linear-gradient(180deg,rgba(245,230,230,.2),rgba(232,239,232,.15),var(--bg))}
.mira-body img{width:100%;display:block;/* Show only left half = front view */object-fit:cover;object-position:left center}

/* Clickable zones on Mira */
.zh{position:absolute;border-radius:50%;cursor:pointer;transition:all .4s;z-index:3;border:2px solid rgba(255,255,255,.4);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px)}
.zh:hover{transform:translate(-50%,-50%) scale(1.2)!important;border-color:var(--zc);background:var(--zc);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.zh.ac{transform:translate(-50%,-50%) scale(1.15)!important;border-color:var(--zc);background:var(--zc);box-shadow:0 8px 24px rgba(0,0,0,.12)}
.zh:hover::after,.zh.ac::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:1.5px solid var(--zc);opacity:.4;animation:zp 2.5s ease-out infinite}
@keyframes zp{0%{transform:scale(.7);opacity:.3}100%{transform:scale(1.8);opacity:0}}
.zh .zi{width:100%;height:100%;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.7)}
.zh:hover .zi,.zh.ac .zi{background:rgba(255,255,255,.9)}
.zh .zi svg{width:14px;height:14px}

/* Side labels */
.zl{position:absolute;font-family:var(--fh);font-size:10px;font-weight:500;color:var(--ch);white-space:nowrap;pointer-events:none;opacity:.7;transition:opacity .3s}
.zh:hover~.zl,.zh.ac~.zl{opacity:1}

/* Right panel */
.panel{position:sticky;top:32px}
.p-welcome{padding:40px 28px;border:1.5px dashed var(--brd);border-radius:24px;text-align:center}
.p-card{background:var(--wh);border-radius:24px;border:1px solid var(--brd);overflow:hidden;animation:pi .5s cubic-bezier(.16,1,.3,1)}
@keyframes pi{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.p-head{padding:18px 24px;border-bottom:1px solid var(--brd);background:linear-gradient(135deg,rgba(232,239,232,.2),rgba(245,230,230,.15))}
.p-nm{font-family:var(--fh);font-size:15px;font-weight:500;color:var(--ch)}
.p-rl{font-size:11px;color:var(--txm);font-weight:300}
.p-body{padding:24px}
.p-msg{font-size:14.5px;color:var(--tx);line-height:1.85;font-weight:300;margin-bottom:20px;white-space:pre-line;animation:mt .4s ease}
@keyframes mt{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.p-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.p-opt{display:block;width:100%;padding:14px 20px;border:1.5px solid var(--brd);border-radius:14px;background:var(--wh);font-family:var(--fb);font-size:14px;color:var(--tx);cursor:pointer;transition:all .3s;text-align:left}
.p-opt:hover{border-color:var(--sage);background:var(--sagep);transform:translateX(4px)}
.p-sect{margin-bottom:14px}
.p-st{font-family:var(--fh);font-size:11px;font-weight:600;color:var(--ch);margin-bottom:6px;letter-spacing:.02em}
.p-it{display:flex;gap:7px;align-items:flex-start;padding:2px 0}
.p-dt{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0}
.p-it span{font-size:12.5px;color:var(--tx);line-height:1.5;font-weight:300}
.p-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.p-tag{font-size:9px;font-weight:600;padding:3px 9px;border-radius:12px}
.p-help{padding:12px;border-radius:10px;background:linear-gradient(135deg,var(--sagep),var(--rosep));margin-top:12px}
.p-ht{font-family:var(--fh);font-size:10px;font-weight:600;color:var(--sage);margin-bottom:4px}
.p-hp{font-size:12.5px;color:var(--tx);line-height:1.6;font-weight:300}
.p-ctas{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.btn-m{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;font-family:var(--fb);font-size:13px;font-weight:600;padding:12px;border-radius:50px;border:none;cursor:pointer;transition:all .3s}
.btn-m-p{background:linear-gradient(135deg,var(--sage),var(--saged));color:#fff;box-shadow:0 4px 14px rgba(124,154,124,.2)}
.btn-m-p:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(124,154,124,.3)}
.btn-m-wa{background:#25D366;color:#fff;box-shadow:0 4px 12px rgba(37,211,102,.15)}
.btn-m-wa:hover{transform:translateY(-2px)}
.btn-m-o{background:var(--wh);color:var(--sage);border:1.5px solid var(--sagem)}
.btn-m-o:hover{background:var(--sagep)}
.disc{font-size:10px;color:var(--txm);line-height:1.5;font-weight:300;text-align:center;margin-top:20px;opacity:.6}
</style>
<script src="assets/js/config.js"></script>
</head>

const S={en:{disc:'Mira is not a therapist. For self-awareness only.',nm:'Mira',rl:'Your guide',welc:'You can start anywhere.\nYour body already knows where to look.',w1:'Explore a zone',symT:'Symptoms',emoT:'Emotions',helpT:'What helps',seekT:'When to reach out',ctaWa:'Chat on WhatsApp',ctaMore:'Explore another zone',
z:{
head:{n:'Head',intro:"The head often carries what we try to control through thinking.\nDo you notice it's hard to 'turn off'?",q1:"Do you overthink after situations pass?",o1a:"Yes, constantly",o1b:"Sometimes",q2:"Hard to fall asleep from racing thoughts?",o2a:"Yes",o2b:"Not really",d_aa:"Your mind is always running. Overthinking is often a way to feel safe — but the head pays the price.",d_ab:"Even occasional overthinking leaves marks. Notice when it happens — usually in moments of uncertainty.",d_ba:"Thoughts that won't stop at night mean something unresolved is asking for attention. Not solving — just acknowledgment.",d_bb:"Good. The tension might be about responsibility or needing to be 'always on.'",sym:['Tension headaches','Migraines','Mental fog','Pressure behind eyes'],emo:[{t:'Anxiety',c:'#C4B08B'},{t:'Overthinking',c:'#C9B5D4'},{t:'Perfectionism',c:'#89A4C7'}],helps:['Body-scan meditation','Journaling before bed','Setting thinking boundaries'],seek:'Chronic headaches — medical eval + therapy.'},
jaw:{n:'Jaw',intro:"The jaw holds what we clench back.\nDo you grind teeth at night or clench during the day?",q1:"Something you want to say but keep holding back?",o1a:"Yes",o1b:"Not sure",q2:"Do you suppress frustration or anger?",o2a:"Yes, often",o2b:"Not particularly",d_aa:"Something unspoken — your jaw literally holds it. The body doesn't forget what the mind silences.",d_ab:"Even unnamed, your jaw may hold tension worth noticing.",d_ba:"Suppressed anger doesn't disappear. It finds another exit — often through the jaw.",d_bb:"Maybe tension from determination — you push through, and the jaw absorbs it.",sym:['Night grinding','TMJ pain','Daytime clenching','Jaw headaches'],emo:[{t:'Suppressed anger',c:'#D49A9A'},{t:'Control',c:'#C9B5D4'}],helps:['Jaw massage before sleep','Notice clenching','Express frustration in words'],seek:'Teeth damage or chronic TMJ — dental + therapy.'},
throat:{n:'Throat',intro:"The throat holds everything unsaid.\nDo you feel a lump or tightness here?",q1:"Situations where it's hard to speak your truth?",o1a:"Yes, definitely",o1b:"Sometimes",q2:"More fear of conflict or judgment?",o2a:"Conflict",o2b:"Judgment",d_aa:"Chronically holding back tightens the throat. Your body speaks for your silence.",d_ab:"Even occasional suppression leaves traces. Notice which situations tighten your throat.",d_ba:"Fear of conflict means others' comfort matters more than your truth. The throat pays.",d_bb:"Fear of judgment can silence the most important things. What if being seen is what you need?",sym:['Lump in throat','Voice loss','Tight neck'],emo:[{t:'Suppressed truth',c:'#89A4C7'},{t:'Shame',c:'#D49A9A'}],helps:['Voice exercises','Unsent letters','Small acts of honesty'],seek:'Persistent lump — assertiveness therapy.'},
shoulders:{n:'Shoulders',intro:"Shoulders carry the weight of responsibility.\nDo you feel you must handle everything alone?",q1:"Hard for you to ask for help?",o1a:"Very hard",o1b:"Sometimes",q2:"Do you take on other people's problems?",o2a:"Yes",o2b:"Not really",d_aa:"When asking for help feels impossible, shoulders absorb everything.",d_ab:"Even occasional reluctance builds up. Shoulders stiffen a little more each time.",d_ba:"Taking on others' burdens is generous but costly. Your body says there's a limit.",d_bb:"Then tension might be about your own high standards.",sym:['Chronic tension','Stiffness','Neck-shoulder pain'],emo:[{t:'Burden',c:'#9BB5A0'},{t:'Guilt',c:'#D49A9A'}],helps:['Delegate one thing this week','Daily stretches','Name what you carry'],seek:'Chronic + headaches — therapy redistributes the load.'},
chest:{n:'Chest',intro:"The chest is your emotional center.\nTension here often means feelings you're not letting yourself feel.",q1:"Hold back emotions or express them?",o1a:"Hold back",o1b:"Express",q2:"Something important that's hard to say to someone?",o2a:"Yes",o2b:"Not really",d_aa:"You hold a lot inside. The chest contracts when we're afraid to feel.",d_ab:"You can express, but perhaps not always safely. That distinction matters.",d_ba:"Something specific is waiting. The heart knows — even when the mind avoids it.",d_bb:"Maybe about loss or vulnerability. The chest often carries old grief.",sym:['Chest tightness','Palpitations','Heaviness'],emo:[{t:'Grief',c:'#89A4C7'},{t:'Heartbreak',c:'#D49A9A'},{t:'Anxiety',c:'#C4B08B'}],helps:['Diaphragmatic breathing','Allow yourself to cry','Vulnerability journal'],seek:'Rule out cardiac first. If clear — grief therapy.'},
back:{n:'Back',intro:"The back represents support.\nDo you feel supported in your life right now?",q1:"People you can truly lean on?",o1a:"Not really",o1b:"Yes, some",q2:"Learned early you can only rely on yourself?",o2a:"Yes",o2b:"Not exactly",d_aa:"When support is absent, the back stiffens to compensate. Especially for expats.",d_ab:"Having some support is good. But the back says it's not enough — or you don't let them in.",d_ba:"Self-reliance as survival becomes armor. The back is tired of carrying what could be shared.",d_bb:"Then pain might be about a specific situation. What changed recently?",sym:['Upper back pain','Morning stiffness','Stress pain'],emo:[{t:'Loneliness',c:'#89A4C7'},{t:'Betrayal',c:'#D49A9A'}],helps:['Where do you need support?','Build network slowly','Attachment therapy'],seek:'Chronic stress pain — physio + psychotherapy.'},
stomach:{n:'Stomach',intro:"Your 'second brain' — 500 million neurons.\nNausea or cramps before stressful events?",q1:"Try to control everything or worry internally?",o1a:"Control",o1b:"Worry",q2:"Do you trust your gut feelings?",o2a:"Not usually",o2b:"Yes",d_aa:"Control is a strategy — but the gut absorbs the effort.",d_ab:"Internal worry that doesn't get expressed settles in the gut.",d_ba:"Not trusting intuition creates tension. The gut speaks louder when not heard.",d_bb:"That's a strength. Stomach tension might be specific anxiety, not a pattern.",sym:['Stress nausea','IBS','Appetite changes'],emo:[{t:'Anxiety',c:'#C4B08B'},{t:'Fear',c:'#C4B08B'}],helps:['Breathing before meals','Find emotional triggers','Name the feeling'],seek:'Chronic + normal tests — anxiety therapy.'},
hands:{n:'Hands',intro:"Hands represent action — doing, creating.\nSomething you want to do but feel unable to?",q1:"Feel stuck or blocked?",o1a:"Yes, very",o1b:"A little",q2:"Fear or uncertainty holding you back?",o2a:"Fear",o2b:"Uncertainty",d_aa:"When we can't act on what we want — hands respond.",d_ab:"Even mild stuckness accumulates. Notice what your hands reach for.",d_ba:"Fear paralyzes action. The smallest step can release the hands.",d_bb:"Uncertainty is harder. Sometimes the first step is choosing a direction, not the right one.",sym:['Sweaty palms','Trembling','Fist clenching'],emo:[{t:'Powerlessness',c:'#89A4C7'},{t:'Frustration',c:'#D49A9A'}],helps:['Creative expression','Ask: what do my hands want?','Movement therapy'],seek:'Persistent stuckness — therapy unlocks energy.'},
