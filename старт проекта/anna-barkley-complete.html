svFaq:[{q:'At what age can a child start therapy?',a:'Children as young as 4-5 can benefit from play-based therapy. The approach is adapted to each age group.'},{q:'Do you work with parents too?',a:'Yes. Parent guidance is an important part of the process. I also offer individual adult therapy for parents.'},{q:'How long does therapy usually take?',a:'Some see progress in 8-12 sessions. Others benefit from longer support. We discuss expectations in our first meeting.'},{q:'Do you offer sessions in Russian?',a:'Yes, I work in both English and Russian. Bilingual sessions are available.'},{q:'Is everything confidential?',a:'Absolutely. Confidentiality is the foundation of our work. For minors, boundaries are discussed with parents upfront.'}],

iss:[
{k:'anxiety',t:'Anxiety',d:'Racing thoughts, persistent worry, panic attacks, avoidance.',full:'Anxiety is one of the most common concerns I work with — in children, teens, and adults. It can look very different depending on age: a child might complain of stomachaches before school, a teenager might withdraw from friends, an adult might find themselves unable to sleep or concentrate.\n\nI use cognitive behavioral therapy, exposure techniques, and mindfulness-based approaches tailored to your age and situation. Most clients notice meaningful improvement within 8-12 sessions.\n\nYou don\'t have to manage this alone. Anxiety responds very well to professional support.',signs:['Persistent worry or dread','Physical symptoms: racing heart, tension, nausea','Avoidance of situations or places','Difficulty sleeping or concentrating','Irritability or restlessness']},
{k:'depression',t:'Depression',d:'Low mood, loss of interest, fatigue, hopelessness.',full:'Depression is more than sadness — it\'s a persistent heaviness that affects how you think, feel, and function. In children, it often looks like irritability or withdrawal rather than "sadness."\n\nI work with each client to understand what\'s driving their depression — whether it\'s grief, life changes, relationship patterns, or something that\'s been building for years.\n\nTherapy provides tools to interrupt negative thought cycles, rebuild motivation, and reconnect with what matters to you.',signs:['Persistent low mood lasting weeks','Loss of interest in activities you used to enjoy','Fatigue and low energy','Changes in sleep or appetite','Feelings of worthlessness or guilt']},
{k:'burnout',t:'Burnout',d:'Emotional exhaustion, cynicism, reduced performance.',full:'Burnout isn\'t just being tired — it\'s a state of emotional, physical, and mental exhaustion caused by prolonged stress. It\'s especially common among expats in Dubai who face high professional demands alongside the stress of living abroad.\n\nI help clients identify what\'s draining them, rebuild boundaries, and reconnect with their values and energy sources. Sometimes it\'s about changing the situation — sometimes it\'s about changing your relationship to it.',signs:['Feeling emotionally drained after work','Cynicism or detachment from your role','Reduced productivity despite working harder','Physical exhaustion that rest doesn\'t fix','Loss of purpose or meaning']},
{k:'school',t:'School Anxiety',d:'Exam stress, refusal, social fears, academic pressure.',full:'School anxiety is increasingly common among children and teens in Dubai\'s competitive international school environment. It can manifest as physical complaints, refusal to attend, meltdowns before tests, or declining grades.\n\nI work with children to build coping strategies, with teens to manage perfectionism and social pressure, and with parents to create a supportive environment at home.',signs:['Complaining of stomachaches or headaches before school','Refusing to go to school','Crying or meltdowns around homework or tests','Excessive worry about grades','Social withdrawal at school']},
{k:'self-esteem',t:'Self-Esteem',d:'Feeling "not enough," comparison, imposter syndrome.',full:'Low self-esteem affects everything — relationships, performance, decision-making, and overall well-being. In children, it often shows as hesitation, sensitivity to criticism, or giving up easily. In adults, it can look like imposter syndrome, people-pleasing, or staying in situations that don\'t serve you.\n\nTherapy helps you understand where these beliefs originated and build a more accurate, compassionate view of yourself.',signs:['Constant self-criticism','Difficulty accepting compliments','Comparing yourself to others','Avoiding challenges for fear of failure','People-pleasing at your own expense']},
{k:'bullying',t:'Bullying',d:'Peer aggression, isolation, digital bullying, recovery.',full:'Bullying — whether physical, verbal, social, or digital — leaves deep emotional marks. Children and teens who are bullied often experience anxiety, depression, social withdrawal, and academic decline.\n\nI help young people process what happened, rebuild their sense of safety and self-worth, and develop assertiveness skills. I also work with parents to understand how to support their child without taking over.',signs:['Sudden reluctance to go to school','Unexplained mood changes','Social withdrawal or loss of friends','Changes in eating or sleeping patterns','Declining academic performance']},
{k:'trauma',t:'Trauma',d:'Past experiences that still affect your present.',full:'Trauma isn\'t just "what happened to you" — it\'s how your brain and body continue to respond long after the event. It can stem from a single incident or from ongoing experiences like neglect, instability, or emotional abuse.\n\nI use EMDR and trauma-focused CBT to help process traumatic memories so they lose their power over your present moment. Healing doesn\'t mean forgetting — it means the memory no longer hijacks your daily life.',signs:['Flashbacks or intrusive memories','Hypervigilance or being easily startled','Emotional numbness or detachment','Avoidance of places, people, or topics','Difficulty trusting others']},
{k:'grief',t:'Grief',d:'Loss, mourning, processing life changes.',full:'Grief is a natural response to loss — whether it\'s the death of someone you love, the end of a relationship, a job, a country, or even an identity you\'ve outgrown. There\'s no "right way" to grieve, and there\'s no timeline.\n\nTherapy offers a space to feel what you feel without judgment, to make sense of the loss, and to gradually find a way forward that honors what was.',signs:['Intense sadness or waves of emotion','Difficulty accepting the loss','Guilt, anger, or regret','Feeling disconnected from others','Loss of meaning or direction']},
{k:'parent-teen',t:'Parent-Teen Conflict',d:'Communication breakdown, boundary struggles, trust.',full:'The parent-teen relationship is one of the most important — and one of the most challenging. As teens push for independence, parents often feel shut out, disrespected, or worried.\n\nI work with both sides: helping teens express what they need, and helping parents listen without reacting. The goal isn\'t to eliminate conflict — it\'s to make it productive.',signs:['Constant arguing or silent treatment','Teen refusing to communicate','Boundary violations on both sides','Loss of trust','Feeling like you\'re walking on eggshells']},
{k:'anger',t:'Anger Management',d:'Emotional outbursts, frustration, difficulty with regulation.',full:'Anger is a normal emotion — but when it controls your behavior, it damages relationships and self-esteem. In children, it often looks like tantrums or aggression. In adults, it might be road rage, explosive arguments, or chronic irritability.\n\nI help clients understand what\'s underneath the anger, develop regulation strategies, and respond rather than react.',signs:['Frequent emotional outbursts','Saying things you regret in the moment','Physical aggression or destructive behavior','Chronic irritability','Difficulty calming down once triggered']},
{k:'divorce',t:'Divorce & Separation',d:'Family restructuring, co-parenting, adjustment.',full:'Divorce and separation affect the entire family system. Children may feel confused, guilty, or anxious. Adults may struggle with identity, loneliness, or co-parenting tension.\n\nI help families navigate this transition with emotional intelligence — supporting children through the change and helping parents communicate more effectively.',signs:['Children acting out or regressing','Difficulty explaining the situation to kids','Co-parenting conflicts','Guilt, anger, or grief in adults','Children "choosing sides"']},
{k:'expat',t:'Expat Adjustment',d:'Relocation stress, identity shifts, loneliness abroad.',full:'Moving to Dubai — or any new country — brings excitement and invisible stress. Culture shock, loneliness, identity questions, career pressure in a new language, and the grief of leaving behind your support network.\n\nI specialize in helping expat families navigate the emotional landscape of life abroad. Bilingual EN/RU.',signs:['Feeling isolated despite being surrounded by people','Identity confusion: "Who am I here?"','Difficulty forming deep connections','Nostalgia and guilt about leaving home','Children struggling to adapt to new school']}

html+=`<div class="page" id="pg-contact"><section class="sect" style="padding-top:180px;text-align:center;background:linear-gradient(160deg,var(--bg),rgba(245,230,230,.3),rgba(232,239,232,.2))"><div class="container" style="max-width:600px"><div class="rv"><span class="tag">${$.coT}</span><h1 style="margin-top:28px">${$.coH}</h1><div class="gl c"></div><p class="bt" style="font-size:18px">${$.coP}</p></div></div></section><section class="sect" style="background:var(--wh);padding-top:60px"><div class="container" style="max-width:700px"><div class="rv"><div class="gc" style="padding:48px"><h3 style="margin-bottom:32px">${$.coFH}</h3><div class="gf"><div><label style="font-size:12px;font-weight:600;color:var(--ch);display:block;margin-bottom:8px">${$.coN}</label><input class="fi2" placeholder="${$.coNP}"></div><div><label style="font-size:12px;font-weight:600;color:var(--ch);display:block;margin-bottom:8px">Email</label><input class="fi2" type="email" placeholder="your@email.com"></div><div><label style="font-size:12px;font-weight:600;color:var(--ch);display:block;margin-bottom:8px">Phone / WhatsApp</label><input class="fi2" placeholder="+971 ..."></div><div><label style="font-size:12px;font-weight:600;color:var(--ch);display:block;margin-bottom:8px">${$.coW}</label><select class="fi2">${$.coO.map((o,i)=>`<option value="${i?o:''}">${o}</option>`).join('')}</select></div></div><div style="margin-top:16px"><label style="font-size:12px;font-weight:600;color:var(--ch);display:block;margin-bottom:8px">${$.coM}</label><textarea class="fi2" rows="5" placeholder="${$.coMP}"></textarea></div><button class="btn btn-p btn-lg magnetic" style="width:100%;margin-top:28px;justify-content:center" onclick="submitForm(this)"><span class="bbg"></span>${$.coS}</button></div></div><div class="rv" style="margin-top:32px;display:flex;gap:16px;flex-wrap:wrap;justify-content:center"><button class="btn btn-wa btn-lg magnetic" style="flex:1;min-width:200px;justify-content:center" onclick="window.open('${WA}','_blank')"><span class="bbg"></span>${$.waB}</button><button class="btn btn-o btn-lg magnetic" style="flex:1;min-width:200px;justify-content:center">${$.tgB}</button></div></div></div></section></div>`;

// PRIVACY
html+=`<div class="page" id="pg-privacy"><section class="sect" style="padding-top:180px;background:var(--bg)"><div class="container" style="max-width:700px"><div class="rv"><h1 style="margin-bottom:12px">${$.pvH}</h1><p class="bt" style="margin-bottom:32px">${lang==='en'?'Last updated: April 2026':'Последнее обновление: апрель 2026'}</p><div class="bt" style="font-size:15px">

<p style="margin-bottom:16px"><strong>${lang==='en'?'1. Data Controller':'1. Контролёр данных'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Anna Barkley, licensed psychologist practicing in Dubai, UAE ("we," "us," "our"), is the data controller responsible for your personal data. DHA License No.: [TO BE INSERTED]. Contact: hello@annabarkley.com, +971 55 123 4567.':'Анна Баркли, лицензированный психолог в Дубае, ОАЭ («мы»), является контролёром данных. Лицензия DHA №: [ВСТАВИТЬ]. Контакт: hello@annabarkley.com, +971 55 123 4567.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'2. Legal Basis for Processing':'2. Правовое основание обработки'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'We process your personal data in accordance with UAE Federal Decree-Law No. 45 of 2021 on the Protection of Personal Data (PDPL). The legal bases for processing are: (a) your explicit consent; (b) performance of a contract (therapy services); (c) compliance with legal obligations; (d) protection of vital interests.':'Мы обрабатываем данные в соответствии с Федеральным указом-законом ОАЭ № 45 от 2021 года о защите персональных данных (PDPL). Правовые основания: (a) ваше явное согласие; (b) исполнение договора (терапевтические услуги); (c) соблюдение правовых обязательств; (d) защита жизненных интересов.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'3. Data We Collect':'3. Данные, которые мы собираем'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'<em>Contact data:</em> Name, email, phone number, WhatsApp number — when you contact us or book a session. <em>Session data:</em> Clinical notes, assessment results, treatment plans — created during therapy. Stored separately from contact data with additional encryption. <em>Health screening data:</em> Responses to online self-assessment tools (anxiety test, etc.) — processed locally in your browser and NOT stored on our servers unless you explicitly share results via WhatsApp or email. <em>Website analytics:</em> Anonymized usage data via Google Analytics 4 (no personally identifiable information). <em>Cookies:</em> Functional cookies only (language preference, cookie consent state). No advertising or tracking cookies.':'<em>Контактные данные:</em> Имя, email, телефон, WhatsApp — при обращении или записи. <em>Данные сессий:</em> Клинические заметки, результаты оценок, планы лечения — создаются во время терапии. Хранятся отдельно от контактных данных с дополнительным шифрованием. <em>Данные скрининга:</em> Ответы на онлайн-тесты (тест тревожности и т.д.) — обрабатываются локально в вашем браузере и НЕ хранятся на наших серверах, если вы явно не отправите результаты через WhatsApp или email. <em>Аналитика сайта:</em> Анонимизированные данные через Google Analytics 4 (без идентификации личности). <em>Cookies:</em> Только функциональные (язык, согласие). Нет рекламных cookie.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'4. How We Use Your Data':'4. Как мы используем данные'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'To respond to inquiries and schedule sessions. To provide therapy services and maintain clinical records as required by DHA regulations. To send appointment reminders and relevant resources (with your consent). To improve our services through anonymized analytics. We never use your data for marketing purposes without explicit opt-in consent.':'Для ответа на запросы и записи на сессии. Для предоставления терапевтических услуг и ведения клинических записей по требованиям DHA. Для напоминаний и отправки ресурсов (с вашего согласия). Для улучшения сервисов через анонимную аналитику. Мы никогда не используем данные для маркетинга без явного согласия.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'5. Data Storage & Retention':'5. Хранение данных и сроки'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'All clinical data is encrypted (AES-256) and stored on secure servers within the UAE or in jurisdictions with adequate data protection (as recognized under PDPL). Contact data: retained for 2 years after last contact, then deleted. Clinical records: retained for the period required by DHA regulations (minimum 5 years from last session), then securely destroyed. Website analytics: anonymized, retained for 14 months (Google Analytics default).':'Все клинические данные зашифрованы (AES-256) и хранятся на защищённых серверах в ОАЭ или юрисдикциях с адекватной защитой данных (признанных PDPL). Контактные данные: хранятся 2 года после последнего контакта. Клинические записи: хранятся в соответствии с требованиями DHA (минимум 5 лет), затем уничтожаются. Аналитика: анонимизированная, 14 месяцев.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'6. Cross-Border Data Transfer':'6. Трансграничная передача данных'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'If any of your data is transferred outside the UAE (e.g., email servers, video conferencing platforms), we ensure that adequate safeguards are in place in accordance with PDPL requirements, including contractual clauses with service providers.':'Если данные передаются за пределы ОАЭ (серверы email, видеоплатформы), мы обеспечиваем адекватные гарантии в соответствии с PDPL, включая контрактные обязательства с провайдерами.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'7. Third-Party Sharing':'7. Передача третьим лицам'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'We never share your personal or clinical data with third parties except: (a) with your explicit written consent (e.g., referral to another specialist); (b) when required by law (imminent risk of harm to self or others, court order); (c) with service providers who process data on our behalf (hosting, email) under strict data processing agreements. We do not sell, rent, or trade your data.':'Мы никогда не передаём данные третьим лицам, кроме: (a) с вашего явного письменного согласия (направление к другому специалисту); (b) по требованию закона (риск вреда, судебное решение); (c) сервис-провайдерам на основании договоров обработки данных. Мы не продаём и не обмениваем ваши данные.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'8. Your Rights Under PDPL':'8. Ваши права по PDPL'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'You have the right to: access your personal data; request correction of inaccurate data; request deletion of your data (subject to legal retention requirements); withdraw consent at any time; request restriction of processing; data portability; lodge a complaint with the UAE Data Office. To exercise any of these rights, contact hello@annabarkley.com. We will respond within 14 business days.':'Вы имеете право: на доступ к данным; на исправление неточностей; на удаление (с учётом сроков хранения); на отзыв согласия; на ограничение обработки; на переносимость данных; на жалобу в UAE Data Office. Для реализации прав: hello@annabarkley.com. Ответ в течение 14 рабочих дней.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'9. Children & Minors':'9. Дети и несовершеннолетние'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'For clients under 18 years of age, written consent from a parent or legal guardian is required before any data is collected or therapy begins. Parents/guardians have the right to access their minor child\'s contact and billing data. Clinical session content is subject to age-appropriate confidentiality boundaries, which are discussed and agreed upon with both the minor and parent/guardian at intake.':'Для клиентов до 18 лет требуется письменное согласие родителя/опекуна до сбора данных или начала терапии. Родители имеют право доступа к контактным и платёжным данным. Содержание сессий подчиняется возрастным границам конфиденциальности, которые обсуждаются с подростком и родителем на первичной консультации.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'10. Data Breach Notification':'10. Уведомление о нарушении данных'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'In the event of a personal data breach that is likely to result in a risk to your rights and freedoms, we will notify the relevant UAE authority and affected individuals without undue delay, and no later than 72 hours after becoming aware of the breach.':'В случае нарушения данных, создающего риск для ваших прав, мы уведомим компетентный орган ОАЭ и пострадавших лиц без неоправданной задержки, не позднее 72 часов.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'11. Online Self-Assessment Tools':'11. Онлайн-инструменты самооценки'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Our website offers interactive self-assessment tools (anxiety screening, breathing exercises, emotion wheel, body-emotions map). These tools: process all data locally in your browser; do not transmit your responses to our servers; are not clinical diagnostic instruments; are provided for educational and self-awareness purposes only. If you choose to share your results via WhatsApp or email, that data becomes part of your contact record and is handled accordingly.':'Наш сайт предлагает интерактивные инструменты (тест тревожности, дыхательные упражнения, колесо эмоций, карту тела). Эти инструменты: обрабатывают данные локально в вашем браузере; не передают ответы на наши серверы; не являются клиническими диагностическими инструментами; предоставляются исключительно для образования и самопознания. Если вы решите поделиться результатами через WhatsApp или email, эти данные станут частью вашей контактной записи.'}</p>

<p><strong>${lang==='en'?'12. Changes to This Policy':'12. Изменения политики'}</strong></p>
<p>${lang==='en'?'We may update this policy to reflect changes in legislation or practice. The current version will always be available on this page with the "last updated" date. Significant changes will be communicated via email to existing clients.':'Мы можем обновлять политику. Актуальная версия всегда доступна на этой странице. О существенных изменениях клиенты будут уведомлены по email.'}</p>

</div></div></div></section></div>`;

// TERMS
html+=`<div class="page" id="pg-terms"><section class="sect" style="padding-top:180px;background:var(--bg)"><div class="container" style="max-width:700px"><div class="rv"><h1 style="margin-bottom:12px">${$.tmH}</h1><p class="bt" style="margin-bottom:32px">${lang==='en'?'Last updated: April 2026':'Последнее обновление: апрель 2026'}</p><div class="bt" style="font-size:15px">

<p style="margin-bottom:16px"><strong>${lang==='en'?'1. Provider Information':'1. Информация о провайдере'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Services are provided by Anna Barkley, licensed psychologist registered with Dubai Health Authority (DHA). License No.: [TO BE INSERTED]. Classification: [Clinical Psychologist / Counselling Psychologist]. Practice operates under applicable DHA standards for mental health services.':'Услуги предоставляются Анной Баркли, лицензированным психологом, зарегистрированным в Dubai Health Authority (DHA). Лицензия №: [ВСТАВИТЬ]. Классификация: [Клинический психолог / Консультативный психолог]. Практика работает по стандартам DHA для услуг ментального здоровья.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'2. Scope of Services':'2. Объём услуг'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Services include: individual therapy (adults, teens, children), parent guidance, family sessions, online therapy sessions, and psychoeducational workshops. Sessions are 50 minutes unless otherwise agreed. Therapy is not a substitute for psychiatric treatment or emergency medical care. If medication or psychiatric evaluation is needed, a referral will be provided.':'Услуги включают: индивидуальную терапию (взрослые, подростки, дети), консультации родителей, семейные сессии, онлайн-терапию и образовательные воркшопы. Сессии — 50 минут. Терапия не заменяет психиатрическое лечение. При необходимости будет предоставлено направление.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'3. Informed Consent':'3. Информированное согласие'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Before the first session, all clients (or their parent/guardian for minors) must provide informed consent. This includes: understanding the nature of therapy, expected duration, approaches used (CBT, EMDR, Play Therapy, etc.), potential risks and benefits, confidentiality boundaries, and the right to withdraw consent at any time. Consent will be documented in writing or electronically and is auditable in accordance with DHA standards.':'Перед первой сессией все клиенты (или родители/опекуны для несовершеннолетних) должны дать информированное согласие: понимание природы терапии, ожидаемая длительность, используемые подходы (КПТ, EMDR, игровая терапия и т.д.), потенциальные риски и преимущества, границы конфиденциальности, право отозвать согласие. Согласие документируется письменно или электронно и является аудируемым по стандартам DHA.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'4. Telehealth / Online Sessions':'4. Телемедицина / Онлайн-сессии'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Online sessions are conducted in accordance with DHA Standards for Telehealth Services. Before the first online session, you must provide separate telehealth consent acknowledging: (a) sessions occur via secure, encrypted video platform; (b) there are inherent limitations to online therapy (inability to respond to emergencies, potential technology disruptions); (c) you are in a private, safe space during the session; (d) you agree to have an emergency contact and local emergency number available; (e) session recording is prohibited by both parties; (f) you have the right to request an in-person session at any time. Your telehealth consent may be provided electronically and will be stored as part of your clinical record.':'Онлайн-сессии проводятся по стандартам DHA для телемедицины. Перед первой онлайн-сессией требуется отдельное согласие: (a) сессии через защищённую видеоплатформу; (b) ограничения онлайн-терапии (невозможность реагировать на экстренные ситуации, технические сбои); (c) вы находитесь в приватном безопасном месте; (d) у вас есть экстренный контакт и номер скорой помощи; (e) запись сессий запрещена обеими сторонами; (f) вы можете запросить очную сессию в любой момент. Согласие может быть электронным и хранится в клинической записи.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'5. Working with Minors (Under 18)':'5. Работа с несовершеннолетними (до 18 лет)'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'For clients under 18, the following applies: (a) Written consent from a parent or legal guardian is required before therapy begins. (b) The parent/guardian will be informed about the general nature and progress of therapy, but specific session content is confidential to the extent appropriate for the child\'s age. (c) For adolescents (13-17), confidentiality boundaries are discussed at intake with both the teen and parent present. Generally: the therapist will not disclose session content to parents unless there is a safety risk (self-harm, harm to others, abuse). (d) Both the minor and parent/guardian have the right to terminate therapy at any time. (e) In cases where the therapist believes the minor is at risk, disclosure to the parent or relevant authorities may be required by law.':'Для клиентов до 18 лет: (a) Требуется письменное согласие родителя/опекуна. (b) Родитель информируется об общем характере и прогрессе, но содержание сессий конфиденциально в рамках, соответствующих возрасту. (c) Для подростков (13-17) границы конфиденциальности обсуждаются на первичной встрече с подростком и родителем. Как правило: терапевт не раскрывает содержание, если нет риска безопасности (самоповреждение, вред другим, насилие). (d) Оба — несовершеннолетний и родитель — имеют право прекратить терапию. (e) При риске для несовершеннолетнего раскрытие информации может быть обязательным по закону.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'6. Confidentiality':'6. Конфиденциальность'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'All information shared in sessions is strictly confidential. Exceptions where disclosure may be required: (a) imminent risk of harm to the client or others; (b) suspicion of child abuse or neglect; (c) court order or legal requirement; (d) with your explicit written consent (e.g., communication with another professional). In case of mandatory disclosure, the therapist will inform the client to the extent legally permitted.':'Всё, сказанное на сессиях, строго конфиденциально. Исключения: (a) непосредственный риск вреда; (b) подозрение на жестокое обращение с детьми; (c) судебное решение или правовое требование; (d) с вашего явного письменного согласия. При обязательном раскрытии терапевт информирует клиента в пределах, допустимых законом.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'7. Fees & Payment':'7. Оплата'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Current fees: Single session 700 AED, 4-session package 2,600 AED, 8-session package 4,800 AED, Family package 3,200 AED. Fees are due at or before the session. Package fees are due at purchase. Fees may be updated with 30 days notice. Payment methods: bank transfer, card. Receipts provided upon request.':'Текущие цены: разовая сессия 700 AED, пакет 4 сессии 2 600 AED, пакет 8 сессий 4 800 AED, семейный пакет 3 200 AED. Оплата при или до сессии. Пакеты — при покупке. Цены могут меняться с уведомлением за 30 дней. Способы: перевод, карта. Чеки по запросу.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'8. Cancellation & No-Show Policy':'8. Политика отмены и неявки'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'24-hour notice is required for cancellation or rescheduling. Late cancellations (less than 24 hours) are charged 50% of the session fee. No-shows are charged the full session fee. Genuine emergencies are handled with compassion on a case-by-case basis. Unused package sessions expire 90 days after purchase unless otherwise agreed.':'Для отмены или переноса требуется 24 часа. Поздние отмены (менее 24 часов) — 50% стоимости сессии. Неявка — полная стоимость. Экстренные ситуации рассматриваются индивидуально. Неиспользованные сессии пакета истекают через 90 дней, если не согласовано иное.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'9. Complaints':'9. Жалобы'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'If you have a concern about the services provided, please contact hello@annabarkley.com. We aim to respond within 5 business days. If the matter is not resolved, you have the right to file a complaint with the Dubai Health Authority.':'При жалобе на услуги: hello@annabarkley.com. Ответ в течение 5 рабочих дней. Если вопрос не решён, вы вправе обратиться в Dubai Health Authority.'}</p>

<p style="margin-bottom:16px"><strong>${lang==='en'?'10. Limitation of Liability':'10. Ограничение ответственности'}</strong></p>
<p style="margin-bottom:16px">${lang==='en'?'Therapy outcomes depend on many factors and cannot be guaranteed. The therapist commits to providing evidence-based, professional care in accordance with applicable standards. Therapy is not a substitute for emergency medical or psychiatric treatment. In crisis situations, contact UAE emergency services (999) or the nearest hospital.':'Результаты терапии зависят от многих факторов и не могут быть гарантированы. Терапевт обязуется предоставлять доказательную профессиональную помощь по стандартам. Терапия не заменяет экстренную помощь. В кризисных ситуациях: 999 или ближайшая больница.'}</p>

<p><strong>${lang==='en'?'11. Governing Law':'11. Применимое право'}</strong></p>
<p>${lang==='en'?'These terms are governed by the laws of the United Arab Emirates and the Emirate of Dubai. Any disputes shall be subject to the jurisdiction of the courts of Dubai.':'Условия регулируются законодательством ОАЭ и эмирата Дубай. Споры подлежат юрисдикции судов Дубая.'}</p>

</div></div></div></section></div>`;

// QUIZ
let qS=0,qA=[];
function renderQuiz(){const $=d(),box=document.getElementById('qBox');if(!box)return;
if(qS>=$.qzQ.length){box.innerHTML=`<div class="rv vis" style="text-align:center"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="1.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg><h3 style="margin:20px 0 12px;font-size:22px">${$.qzR}</h3><p class="bt" style="margin-bottom:32px">${qA.join(' → ')}</p><div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap"><button class="btn btn-p btn-lg magnetic" onclick="goTo('contact')"><span class="bbg"></span>${$.qzC}</button><button class="btn btn-wa btn-lg magnetic" onclick="window.open('${WA}','_blank')"><span class="bbg"></span>${$.waB}</button></div></div>`;return}
const q=$.qzQ[qS];box.innerHTML=`<div class="quiz-prog">${$.qzQ.map((_,i)=>`<div class="quiz-dot${i<=qS?' ac':''}"></div>`).join('')}</div><h3 style="margin-bottom:24px;font-size:22px">${q.q}</h3>${q.o.map(o=>`<button class="quiz-opt" onclick="qPick('${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}`}

function tFaq(el){const w=el.classList.contains('open');el.closest('.sect').querySelectorAll('.fi').forEach(f=>f.classList.remove('open'));if(!w)el.classList.add('open')}

// LANG
function setLang(l){lang=l;qS=0;qA=[];curIssue=null;document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('ac',b.textContent===l.toUpperCase()));document.documentElement.lang=l;render();goToPage('home')}

// NAV
const ptra=document.getElementById('ptra'),ptrb=document.getElementById('ptrb');
const pageMap={home:'pg-home',about:'pg-about',services:'pg-services',issues:'pg-issues','issue-detail':'pg-issue-detail',pricing:'pg-pricing',how:'pg-how',quiz:'pg-quiz',tools:'pg-tools',trust:'pg-trust',contact:'pg-contact',privacy:'pg-privacy',terms:'pg-terms',blog:'pg-blog',b2b:'pg-b2b'};
function goToPage(p){
document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
const el=document.getElementById(pageMap[p]||'pg-home');if(el)el.classList.add('active');
document.querySelectorAll('.nl[data-p]').forEach(l=>l.classList.toggle('ac',l.dataset.p===p));
window.scrollTo(0,0)}
function goTo(p){
ptra.style.transition='transform .5s cubic-bezier(.7,0,.3,1)';ptra.style.transform='translateY(0)';
setTimeout(()=>{ptrb.style.transition='transform .4s cubic-bezier(.7,0,.3,1)';ptrb.style.transform='translateY(0)'},150);
setTimeout(()=>{goToPage(p);closeMM();
setTimeout(()=>{ptrb.style.transition='transform .4s cubic-bezier(.7,0,.3,1)';ptrb.style.transform='translateY(-100%)'},100);
setTimeout(()=>{ptra.style.transition='transform .5s cubic-bezier(.7,0,.3,1)';ptra.style.transform='translateY(-100%)'},200);
setTimeout(()=>{ptra.style.transition='none';ptra.style.transform='translateY(100%)';ptrb.style.transition='none';ptrb.style.transform='translateY(100%)';initR();initC();bindAll()},800)},550)}

let mo=false;
function toggleMenu(){mo=!mo;document.getElementById('mm').classList.toggle('open',mo);document.getElementById('mi').style.display=mo?'none':'block';document.getElementById('ci').style.display=mo?'block':'none';document.body.style.overflow=mo?'hidden':''}
function closeMM(){mo=false;document.getElementById('mm').classList.remove('open');document.getElementById('mi').style.display='block';document.getElementById('ci').style.display='none';document.body.style.overflow=''}

// EFFECTS
let mmx=0,mmy=0,ccx=0,ccy=0;
const curEl=document.getElementById('cur'),curd=document.getElementById('curd');
document.addEventListener('mousemove',e=>{mmx=e.clientX;mmy=e.clientY;curd.style.left=mmx+'px';curd.style.top=mmy+'px';document.querySelectorAll('.btn-p,.btn-wa').forEach(b=>{const r=b.getBoundingClientRect();b.style.setProperty('--mx',((mmx-r.left)/r.width*100)+'%');b.style.setProperty('--my',((mmy-r.top)/r.height*100)+'%')})});
function ac(){ccx+=(mmx-ccx)*.22;ccy+=(mmy-ccy)*.22;curEl.style.left=ccx+'px';curEl.style.top=ccy+'px';requestAnimationFrame(ac)}ac();
document.addEventListener('mouseover',e=>{curEl.classList.toggle('h',!!e.target.closest('button,a,.tilt,.pillar,.tc,.issue-card,.price-card,.quiz-opt'))});

function bindAll(){
document.querySelectorAll('.magnetic').forEach(el=>{el.onmousemove=e=>{const r=el.getBoundingClientRect();el.style.transform=`translate(${(e.clientX-r.left-r.width/2)*.2}px,${(e.clientY-r.top-r.height/2)*.2}px)`};el.onmouseleave=()=>{el.style.transform=''}});
document.querySelectorAll('.tilt').forEach(c=>{c.onmousemove=e=>{const r=c.getBoundingClientRect();c.style.transform=`perspective(800px) rotateY(${((e.clientX-r.left)/r.width-.5)*8}deg) rotateX(${-((e.clientY-r.top)/r.height-.5)*8}deg) scale(1.02)`};c.onmouseleave=()=>{c.style.transform=''}})}

const pe={r1:document.getElementById('r1'),r2:document.getElementById('r2'),s1:document.getElementById('s1'),s2:document.getElementById('s2'),x1:document.getElementById('x1'),x2:document.getElementById('x2')};
function uP(){const s=window.scrollY;pe.r1.style.transform=`scale(${1+s*.0003}) rotate(${s*.02}deg)`;pe.r2.style.transform=`scale(${1.3-s*.0002}) rotate(${-s*.03}deg)`;pe.s1.style.transform=`translate(${Math.sin(s*.002)*30}px,${-s*.08}px) scale(${1+Math.sin(s*.003)*.2})`;pe.s2.style.transform=`translate(${Math.cos(s*.0015)*25}px,${-s*.05}px)`;pe.x1.style.transform=`rotate(${s*.08}deg) scale(${1+Math.sin(s*.004)*.3})`;pe.x2.style.transform=`rotate(${-s*.06}deg)`}
window.addEventListener('scroll',()=>{requestAnimationFrame(uP);document.getElementById('sp').style.width=(window.scrollY/(document.documentElement.scrollHeight-window.innerHeight)*100)+'%';document.getElementById('hdr').classList.toggle('sc',window.scrollY>60)});

function initR(){document.querySelectorAll('.rv:not(.vis),.sw:not(.vis)').forEach(el=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');o.disconnect()}},{threshold:.08});o.observe(el)})}
function initC(){document.querySelectorAll('.ctr').forEach(el=>{const t=parseInt(el.dataset.t2);if(!t||el.dataset.d)return;const o=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.dataset.d='1';const s=performance.now();const tick=n=>{const p=Math.min((n-s)/2200,1);el.textContent=Math.round(t*(1-Math.pow(1-p,4)));if(p<1)requestAnimationFrame(tick)};requestAnimationFrame(tick);o.disconnect()}},{threshold:.3});o.observe(el)})}

// COOKIE
function showCookie(){if(!localStorage.getItem('cookie_ok')){setTimeout(()=>{document.getElementById('cookieBanner').classList.add('show');document.getElementById('cookieText').textContent=d().cookieT},3000)}}
function acceptCookie(){localStorage.setItem('cookie_ok','1');document.getElementById('cookieBanner').classList.remove('show')}

// FORM SUCCESS
function submitForm(btn){const card=btn.closest('.gc');const $=d();card.innerHTML=`<div class="form-ok"><svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="var(--sage)" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/></svg><h3 style="font-size:24px">${$.formOk}</h3><p class="bt" style="font-size:16px">${$.formOkP}</p><button class="btn btn-wa btn-lg magnetic" style="margin-top:24px" onclick="window.open('${WA}','_blank')"><span class="bbg"></span>${$.waB}</button></div>`}

window.addEventListener('load',()=>{fetchRates().then(()=>render());render();setTimeout(()=>{document.getElementById('loader').classList.add('done');initR();initC();uP();bindAll();showCookie()},2200)});
</script>
